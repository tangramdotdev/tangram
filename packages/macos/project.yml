name: Tangram
options:
  fileTypes:
    icon:
      file: true
  bundleIdPrefix: dev.tangram
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: 0.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: F6662JGG49
    ENABLE_HARDENED_RUNTIME: YES
targets:
  Tangram:
    type: application
    platform: macOS
    sources:
      - path: Tangram
        excludes:
          - Resources/Info.plist
          - Resources/Tangram.entitlements
          - Resources/TangramHelper.entitlements
      - path: Tangram/Resources/Assets.xcassets
        type: folder.assetcatalog
    dependencies:
      - target: TangramFSKit
        embed: true
        codeSign: true
    settings:
      base:
        INFOPLIST_FILE: Tangram/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tangram/Resources/Tangram.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
        ENABLE_DEBUG_DYLIB: NO
      configs:
        Debug:
          PRODUCT_NAME: Tangram Dev
          EXECUTABLE_NAME: Tangram
          PRODUCT_BUNDLE_IDENTIFIER: dev.tangram.Tangram.debug
        Release:
          PRODUCT_NAME: Tangram
          EXECUTABLE_NAME: Tangram
          PRODUCT_BUNDLE_IDENTIFIER: dev.tangram.Tangram
  TangramFSKit:
    type: extensionkit-extension
    platform: macOS
    sources:
      - path: TangramFSKit
        excludes:
          - Resources/Info.plist
          - Resources/TangramFSKit.entitlements
          - Resources/TangramFSKitDebug.entitlements
    dependencies:
      - sdk: FSKit.framework
      - sdk: ExtensionFoundation.framework
    settings:
      base:
        INFOPLIST_FILE: TangramFSKit/Resources/Info.plist
        PRODUCT_NAME: TangramFSKit
        EXECUTABLE_NAME: TangramFSKit
        SKIP_INSTALL: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_DEBUG_DYLIB: NO
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: TangramFSKit/Resources/TangramFSKit.entitlements
          PRODUCT_BUNDLE_IDENTIFIER: dev.tangram.Tangram.debug.filesystem
        Release:
          CODE_SIGN_ENTITLEMENTS: TangramFSKit/Resources/TangramFSKit.entitlements
          PRODUCT_BUNDLE_IDENTIFIER: dev.tangram.Tangram.fskit
schemes:
  Tangram:
    build:
      targets:
        Tangram: all
    run:
      config: Debug
    archive:
      config: Release
