[package]
name = "tangram_util"

authors.workspace = true
description.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[lib]
doctest = false

[lints]
workspace = true

[features]
all = ["native"]
default = ["native"]
native = [
  "dep:libc",
  "dep:rustix",
  "dep:scopeguard",
  "dep:uuid",
  "dep:xattr",
  "tokio/fs",
  "tokio/net",
]

[dependencies]
bytes = { workspace = true }
data-encoding = { workspace = true }
data-encoding-macro = { workspace = true }
derive_more = { workspace = true }
fnv = { workspace = true }
futures = { workspace = true }
im = { workspace = true }
libc = { workspace = true, optional = true }
num = { workspace = true }
rustix = { workspace = true, optional = true }
scopeguard = { workspace = true, optional = true }
serde = { workspace = true }
serde-untagged = { workspace = true }
serde_with = { workspace = true }
tangram_either = { workspace = true }
tangram_futures = { workspace = true }
tokio = { workspace = true, features = ["io-util", "rt", "sync", "time"] }
tokio-stream = { workspace = true, features = ["io-util", "sync", "time"] }
tracing = { workspace = true }
uuid = { workspace = true, optional = true }
xattr = { workspace = true, optional = true }
