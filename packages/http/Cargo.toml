tokio = { workspace = true, features = ["io-util", "rt", "sync", "time"] }
tokio-util = { workspace = true, features = ["codec", "io", "rt", "time"] }
tower = { workspace = true }
tracing = { workspace = true }
zstd = { workspace = true, optional = true }
