[package]
name = "tangram_client"

description = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
publish = false
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
all = ["native", "tls", "vsock"]
default = ["native"]
native = [
  "dep:aws-lc-rs",
  "dep:crossterm",
  "dep:libc",
  "dep:miette",
  "dep:xattr",
  "tangram_http/all",
  "tangram_util/all",
  "tokio/fs",
  "tokio/io-std",
  "tokio/net",
  "tokio/process",
  "tokio/rt-multi-thread",
  "tokio/signal",
  "tower-http/compression-zstd",
  "tower-http/decompression-zstd",
]
tls = ["native", "dep:rustls", "dep:rustls-platform-verifier", "dep:tokio-rustls"]
vsock = ["native", "dep:tokio-vsock"]

[lib]
doctest = false

[lints]
workspace = true

[dev-dependencies]
insta = { workspace = true }

[dependencies]
async-channel = { workspace = true }
aws-lc-rs = { workspace = true, optional = true }
bitflags = { workspace = true }
blake3 = { workspace = true }
byte-unit = { workspace = true }
byteorder = { workspace = true }
bytes = { workspace = true }
crossterm = { workspace = true, optional = true }
data-encoding = { workspace = true }
data-encoding-macro = { workspace = true }
derive_more = { workspace = true }
futures = { workspace = true }
http = { workspace = true }
http-body = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }
indoc = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
libc = { workspace = true, optional = true }
lsp-types = { workspace = true }
mime = { workspace = true }
miette = { workspace = true, optional = true }
num = { workspace = true }
regex = { workspace = true }
rustls = { workspace = true, optional = true }
rustls-platform-verifier = { workspace = true, optional = true }
scopeguard = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_qs = { workspace = true }
serde_with = { workspace = true }
sha2 = { workspace = true }
tangram_either = { workspace = true }
tangram_futures = { workspace = true }
tangram_http = { workspace = true }
tangram_pool = { workspace = true }
tangram_serialize = { workspace = true }
tangram_uri = { workspace = true }
tangram_util = { workspace = true }
time = { workspace = true }
tokio = { workspace = true, features = ["io-util", "macros", "rt", "sync", "time", "tracing"] }
tokio-rustls = { workspace = true, optional = true }
tokio-stream = { workspace = true, features = ["sync", "time"] }
tokio-util = { workspace = true, features = ["codec", "io", "io-util", "rt", "time"] }
tokio-vsock = { workspace = true, optional = true }
tower = { workspace = true }
tower-http = { workspace = true, features = ["add-extension", "map-request-body", "map-response-body", "set-header", "timeout", "util"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["js"] }
winnow = { workspace = true }
xattr = { workspace = true, optional = true }
