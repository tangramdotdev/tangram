tangram_http = { workspace = true }
tangram_ignore = { workspace = true }
tangram_index = { workspace = true }
tangram_js = { workspace = true, optional = true }
tangram_log_store = { workspace = true }
tangram_messenger = { workspace = true }
tangram_object_store = { workspace = true }
tangram_sandbox = { workspace = true }
tangram_serialize = { workspace = true }
tangram_uri = { workspace = true }
tangram_util = { workspace = true }
tangram_vfs = { workspace = true }
time = { workspace = true }
tokio = { workspace = true }
tokio-postgres = { workspace = true, optional = true }
