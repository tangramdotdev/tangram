[package]
name = "tangram_server"

description = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
publish = false
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[package.metadata.cargo-shear]
ignored = ["tangram_js", "tokio-postgres"]

[features]
foundationdb = ["tangram_index/foundationdb", "tangram_log_store/foundationdb"]
js = ["dep:tangram_js"]
lmdb = ["dep:heed", "tangram_index/lmdb", "tangram_log_store/lmdb", "tangram_object_store/lmdb"]
nats = ["dep:async-nats", "tangram_messenger/nats"]
postgres = ["dep:tokio-postgres", "tangram_database/postgres"]
quickjs = ["tangram_js/quickjs"]
sqlite = ["dep:rusqlite", "tangram_database/sqlite"]
scylla = ["tangram_object_store/scylla"]
tls = ["dep:rustls", "dep:rustls-pemfile", "dep:tokio-rustls"]
typescript = ["tangram_compiler/typescript"]
v8 = ["tangram_js/v8"]
vsock = ["dep:tokio-vsock", "tangram_client/vsock", "tangram_sandbox/vsock"]

[lib]
doctest = false
test = false

[lints]
workspace = true

[dependencies]
async-broadcast = { workspace = true }
async-channel = { workspace = true }
async-nats = { workspace = true, optional = true }
bytes = { workspace = true }
crossterm = { workspace = true }
dashmap = { workspace = true }
data-encoding = { workspace = true }
data-encoding-macro = { workspace = true }
derive_more = { workspace = true }
fastcdc = { workspace = true }
filetime = { workspace = true }
fnv = { workspace = true }
futures = { workspace = true }
http = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }
heed = { workspace = true, optional = true }
im = { workspace = true }
indexmap = { workspace = true }
indoc = { workspace = true }
itertools = { workspace = true }
libc = { workspace = true }
mime = { workspace = true }
notify = { workspace = true }
num = { workspace = true }
opentelemetry = { workspace = true }
octocrab = { workspace = true }
oauth2 = { workspace = true }
petgraph = { workspace = true }
reflink-copy = { workspace = true }
reqwest = { workspace = true }
rustls = { workspace = true, optional = true }
rustls-pemfile = { workspace = true, optional = true }
rusqlite = { workspace = true, optional = true }
scopeguard = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
smallvec = { workspace = true }
sync_wrapper = { workspace = true }
tangram_client = { workspace = true }
