[package]
name = "tangram_index"

description = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
publish = false
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
foundationdb = ["dep:foundationdb", "dep:foundationdb-tuple", "dep:opentelemetry"]
lmdb = ["dep:heed", "dep:foundationdb-tuple"]

[lints]
workspace = true

[lib]
doctest = false

[dependencies]
bitflags = { workspace = true }
crossbeam-channel = { workspace = true }
derive_more = { workspace = true }
foundationdb = { workspace = true, optional = true }
foundationdb-tuple = { workspace = true, optional = true }
futures = { workspace = true }
heed = { workspace = true, optional = true }
num = { workspace = true }
num-derive = { workspace = true }
num-traits = { workspace = true }
opentelemetry = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
tangram_client = { workspace = true, features = ["all"] }
tangram_serialize = { workspace = true }
tangram_util = { workspace = true, features = ["all"] }
tokio = { workspace = true, features = ["full", "tracing"] }

[dev-dependencies]
tempfile = "3"
